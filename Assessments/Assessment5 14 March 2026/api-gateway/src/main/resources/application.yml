server:
  port: 6002
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: passenger-service-route
          uri: lb://passenger-service
          predicates:
            - Path=/passengers/**
        - id: car-rental-service-route
          uri: lb://car-rental-service
          predicates:
            - Path=/cars/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:6000/eureka/